<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${order.id == null ? 'Create New Order' : 'Edit Order'}"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/orders.css}">
</head>
<body>
    <header>
        <h1 th:text="${order.id == null ? 'Create New Order' : 'Edit Order'}"></h1>
        <nav>
            <ul>
                <li><a th:href="@{/products}">Products</a></li>
                <li><a th:href="@{/orders}" class="active">My Orders</a></li>
                <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/users}">Users</a></li>
                <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/logs}">Logs</a></li>
                <li><a th:href="@{/logout}">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="container">
            <form th:action="@{/orders/save}" th:object="${order}" method="post">
                <input type="hidden" th:field="*{id}" />
                
                <div class="form-group">
                    <label for="orderDate">Order Date</label>
                    <input type="date" id="orderDate" th:field="*{orderDate}" required class="form-control" 
                           th:classappend="${#fields.hasErrors('orderDate')} ? 'is-invalid'" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('orderDate')}" th:errors="*{orderDate}"></div>
                </div>
                
                <div class="form-group">
                    <label for="product">Product</label>
                    <select id="product" th:field="*{product}" class="form-control" required>
                        <option value="">-- Select Product --</option>
                        <option th:each="prod : ${products}" 
                                th:value="${prod.id}" 
                                th:text="${prod.name + ' - $' + prod.price}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('product')}" th:errors="*{product}"></div>
                </div>
                
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" th:field="*{quantity}" min="1" required class="form-control"
                           th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                </div>
                
                <div class="form-group">
                    <label for="comments">Comments</label>
                    <textarea id="comments" th:field="*{comments}" rows="4" class="form-control"></textarea>
                </div>
                
                <div class="form-group buttons">
                    <button type="submit" class="btn btn-primary">Save Order</button>
                    <a th:href="@{/orders}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 CRUD Application</p>
    </footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
